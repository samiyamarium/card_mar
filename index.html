<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Union - Danish & Samiya</title>
    <style>
        :root {
            --deep-night: #0a192f;
            --moon-glow: #f0f4f8;
            --silver-glitter: #e0e0e0;
            --royal-blue: #1a3a6c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #020111 10%, #191621 100%);
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Starry Sky Background */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* The Moon */
        .moon {
            position: absolute;
            top: 50px;
            right: 80px;
            width: 100px;
            height: 100px;
            background: var(--moon-glow);
            border-radius: 50%;
            box-shadow: 0 0 40px 10px rgba(240, 244, 248, 0.3);
            z-index: 1;
        }

        /* The Card */
        .card {
            position: relative;
            width: 500px;
            background: rgba(26, 58, 108, 0.3);
            backdrop-filter: blur(20px);
            border: none; /* Borders Removed */
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            z-index: 10;
            color: white;
            overflow: hidden;
        }

        /* Silver Flower Background */
        .bg-flower {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 25rem;
            color: rgba(192, 192, 192, 0.08); /* Subtle silver */
            z-index: -1;
            user-select: none;
            filter: blur(2px);
            animation: slow-rotate 20s infinite linear;
        }

        @keyframes slow-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .flower-ornament {
            font-size: 3rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px white);
            animation: shimmer 2s infinite alternate;
        }

        @keyframes shimmer {
            from { opacity: 0.8; filter: drop-shadow(0 0 5px white); }
            to { opacity: 1; filter: drop-shadow(0 0 20px #c0c0c0); }
        }

        h2 {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1rem;
            color: var(--silver-glitter);
        }

        .names {
            font-size: 3.5rem;
            margin: 20px 0;
            background: linear-gradient(45deg, #ffffff, #c0c0c0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .quote {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.9);
            padding: 0 20px;
        }

        .wedding-text {
            font-size: 2rem;
            margin-top: 40px;
            letter-spacing: 8px;
            color: var(--silver-glitter);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Glittery Decorative Flowers */
        .glitter-flower {
            position: absolute;
            font-size: 4rem;
            z-index: 5;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
            animation: sway 4s infinite ease-in-out;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .f1 { bottom: -20px; left: -20px; }
        .f2 { top: -20px; right: -20px; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="moon"></div>

    <div class="glitter-flower f1">🌸</div>
    <div class="glitter-flower f2">✨🌸</div>

    <div class="card">
        <!-- The Background Silver Flower -->
        <div class="bg-flower">🌸</div>
        
        <div class="flower-ornament">❄️💎❄️</div>
        
        <h2>Union of Two Souls</h2>
        
        <div class="names">
            Danish <br> & <br> Samiya
        </div>

        <div class="quote">
            "Under the same moon and the vast silver sky, two hearts beat as one. May your love be as infinite as the heavens and as brilliant as the stars that guide us home."
        </div>

        <div class="wedding-text">HAPPY MARRIAGE</div>
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
